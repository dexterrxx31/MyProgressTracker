<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#070a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Study Tracker">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="A 30-day study tracker with 7 tracks — CS Fundamentals, DSA, Low- & High-Level System Design, RAG for AI, Kubernetes, and Java/Spring/Python. Checkboxes, streaks, notes and per-plan progress, saved in your browser.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>30-Day Study Tracker — CS, DSA, System Design & more</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <div>
        <h1>30-Day Study Tracker</h1>
        <p id="plan-subtitle" class="subtitle">Operating Systems · DBMS · Computer Networks · OOPs</p>
      </div>
      <span id="streak" class="streak-badge">🔥 0 days</span>
    </div>

    <nav id="plan-tabs" class="plan-tabs" aria-label="Study plans"></nav>

    <div class="overall">
      <div class="overall-head">
        <span class="overall-label">Overall progress</span>
        <span id="overall-pct" class="overall-pct">0%</span>
      </div>
      <div class="bar big"><div id="overall-bar" class="bar-fill" style="width:0%"></div></div>
      <span id="overall-count" class="overall-count">0 / 0 topics</span>
    </div>

    <div id="subject-bars" class="subject-bars"></div>

    <div class="controls">
      <button id="export-btn" class="btn">⬇ Export</button>
      <button id="import-btn" class="btn">⬆ Import</button>
      <button id="reset-btn" class="btn danger">↺ Reset</button>
      <input type="file" id="import-input" accept="application/json" hidden>
    </div>
  </header>

  <main id="days" class="days-grid"></main>

  <footer class="app-footer">
    <p>Study 2h on weekdays · 5h on weekends. Progress saves automatically in your browser.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
